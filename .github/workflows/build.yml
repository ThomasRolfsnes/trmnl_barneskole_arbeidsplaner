name: Build arbeidsplan images

on:
  schedule:
    - cron: "0 4 * * *"   # daily ~06:00 Europe/Oslo (04:00 UTC)
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - "scraper/**"
      - "schools/**"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/build.yml"

permissions:
  contents: write

concurrency:
  group: build-arbeidsplan
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Render weekly plans
        env:
          # Optional override; otherwise derived from the repo (owner.github.io/repo).
          PAGES_BASE_URL: ${{ vars.PAGES_BASE_URL }}
        run: uv run scraper/build.py --device trmnl_x_landscape

      - name: Commit & push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs
          if git diff --cached --quiet; then
            echo "No changes."
          else
            git commit -m "Update arbeidsplaner ($(date -u +%Y-%m-%dT%H:%MZ))"
            git push
          fi
