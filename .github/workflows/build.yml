name: Build & deploy arbeidsplaner

on:
  schedule:
    - cron: "0 4 * * *"   # daily ~06:00 Europe/Oslo (04:00 UTC)
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - "scraper/**"
      - "schools/**"
      - "docs/**"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/build.yml"

# Images are built fresh each run and published as an ephemeral Pages artifact —
# nothing is committed to git, so there is no history bloat and removed
# schools/grades simply stop being deployed.
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Configure Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Render weekly plans
        env:
          PAGES_BASE_URL: ${{ steps.pages.outputs.base_url }}
        run: uv run scraper/build.py --device trmnl_x_landscape

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
