---
name: Skolens arbeidsplan
strategy: polling
polling_verb: get

# {{ school }} and {{ trinn }} are filled from the form fields below. IMPORTANT:
# the plugin INSTANCE must have Skole/Trinn explicitly selected and saved — the
# form-field defaults are NOT applied to the polling URL automatically (an unset
# field interpolates to empty, giving .../<empty>/trinn-.json -> 404).
polling_url: https://thomasrolfsnes.github.io/trmnl_barneskole_arbeidsplaner/{{ school }}/trinn-{{ trinn }}.json
polling_headers: ''

# Edge-to-edge: the plan image fills the whole screen.
no_screen_padding: 'yes'
dark_mode: 'no'

# Plans change weekly; poll every 6 hours. The screen only re-renders when the
# polled data actually changes (the image URL carries a content hash).
refresh_interval: 360
framework_version: latest

# Form-fields format (verified against TRMNL's form builder):
#  - paste just the list below (without the `custom_fields:` line) into the UI
#  - option dashes align with the `options:` key (deeper nesting is rejected)
#  - select options must be FLAT scalars, not "Label: value" maps; the value is
#    shown as the label, so values must equal the docs/<id> folder names
#  - keyname must match the polling_url variables ({{ school }}, {{ trinn }})
custom_fields:
  - keyname: school
    name: Skole
    field_type: select
    description: Velg skole
    options:
    - minde
    - nordnes
    - alvoen
    default: minde
  # trinn is a number field, not a select: select option keys like "1. trinn"
  # (digit + period) break TRMNL's form-builder YAML parser.
  - keyname: trinn
    name: Trinn
    field_type: number
    description: Velg klassetrinn (1-7)
    default: "1"
    min: 1
    max: 7
    step: 1
